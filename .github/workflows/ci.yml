name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: install
        run: pip install -e ".[dev]"
      - name: lint
        run: ruff check src tests scripts dashboard
      - name: tests
        run: pytest tests/ -v --tb=short
      - name: smoke
        run: python scripts/run_pricing_smoke.py
